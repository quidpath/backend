      DATABASE_URL: "postgresql://devuser:devpass@projects-db:5432/devdb"
      SECRET_KEY: "local-dev-secret-key"
      JWT_SECRET_KEY: "local-jwt-secret"
      SERVICE_SECRET: "local-service-secret"
      PROJECTS_SERVICE_SECRET: "local-service-secret"
