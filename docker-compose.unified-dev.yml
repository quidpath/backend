version: '3.8'

services:
  # ============================================================================
  # Inventory Service
  # ============================================================================
  inventory-db:
    image: postgres:15
    container_name: postgres_inventory_dev
    restart: unless-stopped
    ports:
      - "5437:5432"
    volumes:
      - postgres_inventory_dev_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quidpath_dev_network

  inventory-backend:
    build:
      context: ../inventory
      dockerfile: Dockerfile
    container_name: inventory-backend-dev
    restart: unless-stopped
    ports:
      - "8004:8000"
    depends_on:
      inventory-db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: inventory_service.settings.dev
      DJANGO_ENV: dev
      DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,*"
      DATABASE_URL: "postgresql://devuser:devpass@inventory-db:5432/devdb"
      SECRET_KEY: "local-dev-secret-key"
      JWT_SECRET_KEY: "local-jwt-secret"
      SERVICE_SECRET: "local-service-secret"
      INVENTORY_SERVICE_SECRET: "local-service-secret"
    volumes:
      - ../inventory:/app
      - inventory_media_dev:/app/media
      - inventory_staticfiles_dev:/app/staticfiles
    networks:
      - quidpath_dev_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # POS Service
  # ============================================================================
  pos-db:
    image: postgres:15
    container_name: postgres_pos_dev
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres_pos_dev_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quidpath_dev_network

  pos-backend:
    build:
      context: ../pos
      dockerfile: Dockerfile
    container_name: pos-backend-dev
    restart: unless-stopped
    ports:
      - "8003:8000"
    depends_on:
      pos-db:
        condition: service_healthy
      inventory-backend:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: pos_service.settings.dev
      DJANGO_ENV: dev
      DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,*"
      DATABASE_URL: "postgresql://devuser:devpass@pos-db:5432/devdb"
      SECRET_KEY: "local-dev-secret-key"
      JWT_SECRET_KEY: "local-jwt-secret"
      SERVICE_SECRET: "local-service-secret"
      POS_SERVICE_SECRET: "local-service-secret"
      # Inventory service connection
      INVENTORY_SERVICE_URL: "http://inventory-backend-dev:8000"
      INVENTORY_SERVICE_SECRET: "local-service-secret"
    volumes:
      - ../pos:/app
      - pos_media_dev:/app/media
      - pos_staticfiles_dev:/app/staticfiles
    networks:
      - quidpath_dev_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Projects Service
  # ============================================================================
  projects-db:
    image: postgres:15
    container_name: postgres_projects_dev
    restart: unless-stopped
    ports:
      - "5434:5432"
    volumes:
      - postgres_projects_dev_data:/var/lib/postgresql/data
