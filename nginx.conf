# Upstream definitions for all services
upstream django_backend {
    server 127.0.0.1:8000;
}

upstream nextjs_frontend {
    server 127.0.0.1:3000;
}

upstream billing_backend {
    server 127.0.0.1:8002;
}

upstream tazama_backend {
    server 127.0.0.1:8001;
}

# HTTP to HTTPS redirect for all domains
server {
    listen 80;
    server_name api.quidpath.com quidpath.com www.quidpath.com billing.quidpath.com ai.quidpath.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# API Backend (api.quidpath.com)
# ============================================
server {
    listen 443 ssl http2;
    server_name api.quidpath.com;
    charset utf-8;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/api.quidpath.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.quidpath.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # Proxy to Django backend
    location / {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        add_header Cache-Control "no-store" always;
    }

    # Static files
    location /static/ {
        alias /mnt/quidpath-data/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Media files
    location /media/ {
        alias /mnt/quidpath-data/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

# ============================================
# Frontend (quidpath.com, www.quidpath.com)
# ============================================
server {
    listen 443 ssl http2;
    server_name quidpath.com www.quidpath.com;
    charset utf-8;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/quidpath.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quidpath.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Proxy to Next.js frontend
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

