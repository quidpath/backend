# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name api.quidpath.com;
    charset utf-8;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Secure HTTPS server
server {
    listen 443 ssl;
    server_name api.quidpath.com;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/api.quidpath.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.quidpath.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ======================
    # ✅ Proxy to Django app
    # ======================
    location / {
        proxy_pass http://django-backend:8000;

        # Preserve request headers for Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ======================
        # ✅ CORS & security headers
        # ======================
        if ($http_origin ~* (https://quidpath\.com|https://www\.quidpath\.com)) {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Vary' 'Origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-CSRFToken' always;
        }

        # Security headers for all responses
        add_header 'X-Content-Type-Options' 'nosniff' always;
        add_header 'Referrer-Policy' 'strict-origin-when-cross-origin' always;
        add_header 'Content-Security-Policy' "frame-ancestors 'none'" always;

        # Hide framework header from upstreams
        proxy_hide_header X-Powered-By;

        # ✅ Handle preflight OPTIONS requests
        if ($request_method = OPTIONS) {
            # Echo back CORS headers on preflight
            if ($http_origin ~* (https://quidpath\.com|https://www\.quidpath\.com)) {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Vary' 'Origin' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-CSRFToken' always;
            }
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain; charset=UTF-8';
            return 204;
        }

        # Dynamic API responses should not be cached
        add_header 'Cache-Control' 'no-store' always;
    }

    # ======================
    # ✅ Serve static files
    # ======================
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ======================
    # ✅ Serve media files
    # ======================
    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
