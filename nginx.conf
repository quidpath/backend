# ============================================
# Projects Service (projects.quidpath.com) — WebSocket-capable via Daphne
# ============================================
server {
    listen 443 ssl http2;
    server_name projects.quidpath.com;
    charset utf-8;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/projects.quidpath.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/projects.quidpath.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # WebSocket upgrade for real-time project notifications
    location /ws/ {
        proxy_pass http://projects_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://projects_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_hide_header X-Powered-By;
        add_header Cache-Control "no-store" always;
    }

    location /static/ {
        alias /mnt/quidpath-data/projects-static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /mnt/quidpath-data/projects-media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

