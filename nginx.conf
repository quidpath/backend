# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name api.quidpath.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Secure HTTPS server
server {
    listen 443 ssl;
    server_name api.quidpath.com;

    ssl_certificate /etc/letsencrypt/live/api.quidpath.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.quidpath.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ======================
    # ✅ Proxy to Django app
    # ======================
    location / {
        proxy_pass http://django-backend:8000;

        # Preserve request headers for Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ======================
        # ✅ Allow CORS (important for frontend)
        # ======================
        add_header 'Access-Control-Allow-Origin' 'https://quidpath.com' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-CSRFToken' always;

        # ✅ Handle preflight OPTIONS requests
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }
    }

    # ======================
    # ✅ Serve static files
    # ======================
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ======================
    # ✅ Serve media files
    # ======================
    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
