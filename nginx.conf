## CORS handled by Django; no reflection here

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name api.quidpath.com;
    charset utf-8;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Secure HTTPS server
server {
    listen 443 ssl;
    server_name api.quidpath.com;
    charset utf-8;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/api.quidpath.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.quidpath.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ======================
    # ✅ Proxy to Django app
    # ======================
    location / {
        proxy_pass http://django-backend:8000;

        # Preserve request headers for Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers for all responses (CORS by Django)
        add_header 'X-Content-Type-Options' 'nosniff' always;
        # CRITICAL: Use "strict-origin-when-cross-origin" (not "no-referrer") to allow
        # Django admin CSRF validation. This still provides strong privacy without
        # blocking the Referer header that Django needs for CSRF protection.
        add_header 'Referrer-Policy' 'strict-origin-when-cross-origin' always;
        add_header 'Content-Security-Policy' "frame-ancestors 'none'" always;

        # Hide framework header from upstreams
        proxy_hide_header X-Powered-By;

        # Preflight is proxied to Django

        # Dynamic API responses should not be cached
        add_header 'Cache-Control' 'no-store' always;
    }

    # Ensure login is never cached and always carries explicit header
    location = /login/ {
        proxy_pass http://django-backend:8000/login/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'X-Content-Type-Options' 'nosniff' always;
        # CRITICAL: Use "strict-origin-when-cross-origin" (not "no-referrer") to allow
        # Django admin CSRF validation. This still provides strong privacy without
        # blocking the Referer header that Django needs for CSRF protection.
        add_header 'Referrer-Policy' 'strict-origin-when-cross-origin' always;
        add_header 'Content-Security-Policy' "frame-ancestors 'none'" always;
        proxy_hide_header X-Powered-By;

        add_header 'Cache-Control' 'no-store' always;
        # Preflight is proxied to Django
    }

    # ======================
    # ✅ Serve static files
    # ======================
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ======================
    # ✅ Serve media files
    # ======================
    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
