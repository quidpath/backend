name: Dependency Updates

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Python dependencies
        working-directory: ./quidpath-backend
        run: |
          pip install pip-review
          pip-review --local --auto || true

      - name: Check Node.js dependencies
        working-directory: ./quidpath-erp-frontend
        run: |
          npm outdated || true
          npx npm-check-updates || true

      - name: Create issue for updates
        uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Dependency Updates Available',
              body: 'Automated dependency check found updates. Please review and update dependencies.',
              labels: ['dependencies', 'automated']
            })
