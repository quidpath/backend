name: Build & Push Django Backend

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: bethwelkimutai/quidpath-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        id: ssm-deploy
        run: |
          echo "🚀 Triggering deployment on EC2..."
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-03491863fe1f5abce" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Django Backend - Build #${{ github.run_number }}" \
            --parameters 'commands=["bash /home/ubuntu/deploy.sh"]' \
            --query "Command.CommandId" \
            --output text \
            --region ${{ secrets.AWS_REGION }})
          
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "✅ SSM Command ID: $COMMAND_ID"
        shell: bash

      - name: Wait for deployment to complete
        run: |
          echo "⏳ Waiting for EC2 deployment to complete..."
          MAX_ATTEMPTS=60
          SLEEP_INTERVAL=10
          
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(aws ssm list-commands \
              --command-id ${{ steps.ssm-deploy.outputs.command_id }} \
              --query "Commands[0].Status" \
              --output text \
              --region ${{ secrets.AWS_REGION }})

            echo "⏱️  Attempt $i/$MAX_ATTEMPTS → Status: $STATUS"

            case "$STATUS" in
              "Success")
                echo "✅ Deployment completed successfully!"
                echo ""
                echo "📋 Deployment Output:"
                aws ssm get-command-invocation \
                  --command-id ${{ steps.ssm-deploy.outputs.command_id }} \
                  --instance-id "i-03491863fe1f5abce" \
                  --query 'StandardOutputContent' \
                  --output text \
                  --region ${{ secrets.AWS_REGION }}
                exit 0
                ;;
              "Failed")
                echo "❌ Deployment failed!"
                echo ""
                echo "📋 Error Output:"
                aws ssm get-command-invocation \
                  --command-id ${{ steps.ssm-deploy.outputs.command_id }} \
                  --instance-id "i-03491863fe1f5abce" \
                  --query 'StandardErrorContent' \
                  --output text \
                  --region ${{ secrets.AWS_REGION }}
                echo ""
                echo "📋 Standard Output:"
                aws ssm get-command-invocation \
                  --command-id ${{ steps.ssm-deploy.outputs.command_id }} \
                  --instance-id "i-03491863fe1f5abce" \
                  --query 'StandardOutputContent' \
                  --output text \
                  --region ${{ secrets.AWS_REGION }}
                exit 1
                ;;
              "Cancelled"|"TimedOut")
                echo "❌ Deployment $STATUS"
                exit 1
                ;;
            esac

            sleep $SLEEP_INTERVAL
          done

          echo "❌ Timeout: Deployment did not complete within $((MAX_ATTEMPTS * SLEEP_INTERVAL / 60)) minutes"
          exit 1
        shell: bash