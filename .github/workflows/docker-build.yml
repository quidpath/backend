name: Build & Push Django Backend

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: bethwelkimutai/quidpath-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        id: ssm-deploy
        run: |
          echo "🚀 Sending deployment command to EC2..."
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-03491863fe1f5abce \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying latest Django backend" \
            --parameters '{
              "commands": [
                "echo ---- Starting Deployment ----",
                "cd /home/ubuntu/quidpath-erp-backend || { echo Directory not found; exit 1; }",
                "echo ---- Directory OK ----",
                "sudo systemctl start docker || true",
                "docker --version || { echo Docker not found; exit 1; }",
                "if ! docker compose version >/dev/null 2>&1; then echo Installing docker compose plugin...; sudo apt-get update -y && sudo apt-get install -y docker-compose-plugin && docker compose version; fi",
                "echo ---- Pulling latest image ----",
                "sudo docker compose pull backend || sudo docker-compose pull backend || { echo Failed to pull image; exit 1; }",
                "echo ---- Restarting container ----",
                "sudo docker compose up -d --no-deps backend || sudo docker-compose up -d --no-deps backend || { echo Failed to start container; exit 1; }",
                "echo ---- Deployment finished successfully ----"
              ]
            }' \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "✅ SSM Command ID: $COMMAND_ID"
        shell: bash

      - name: Wait for SSM Command to finish
        run: |
          echo "⏳ Waiting for EC2 deployment to complete..."
          MAX_ATTEMPTS=90   # 90 attempts × 10 seconds = 15 minutes
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(aws ssm list-commands \
              --command-id ${{ steps.ssm-deploy.outputs.command_id }} \
              --query "Commands[0].Status" \
              --output text \
              --region ${{ secrets.AWS_REGION }})
            
            echo "Attempt $i/$MAX_ATTEMPTS → Status: $STATUS"
            
            if [[ "$STATUS" == "Success" ]]; then
              echo "✅ Command executed successfully!"
              aws ssm list-command-invocations \
                --command-id ${{ steps.ssm-deploy.outputs.command_id }} \
                --details \
                --region ${{ secrets.AWS_REGION }}
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" ]]; then
              echo "❌ Command failed or cancelled!"
              aws ssm list-command-invocations \
                --command-id ${{ steps.ssm-deploy.outputs.command_id }} \
                --details \
                --region ${{ secrets.AWS_REGION }}
              exit 1
            fi

            sleep 10
          done

          echo "❌ Timeout: Command did not complete within 15 minutes."
          aws ssm list-command-invocations \
            --command-id ${{ steps.ssm-deploy.outputs.command_id }} \
            --details \
            --region ${{ secrets.AWS_REGION }}
          exit 1