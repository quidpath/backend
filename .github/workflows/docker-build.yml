name: Build & Push Django Backend

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # ✅ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build and push Docker image
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: bethwelkimutai/quidpath-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push  # Run after build succeeds
    permissions:
      id-token: write  # For OIDC
      contents: read

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Server via SSM
        id: ssm-command
        uses: peterkimzz/aws-ssm-send-command@v1.0.1  # Reliable action for this
        with:
          instance-ids: i-03491863fe1f5abce
          region: ${{ secrets.AWS_REGION }}
          working-directory: /home/ubuntu/quidpath-erp-backend  # Adjust if needed
          command: |  # Your script as multi-line
            docker-compose pull django-backend
            docker-compose up -d --no-deps django-backend
          comment: Deploying latest Django backend

      - name: Check SSM Command Status  # Optional: Wait and log output
        run: |
          aws ssm wait command-invoked --command-id "${{ steps.ssm-command.outputs.command-id }}" --instance-id <your-instance-id>
          aws ssm list-command-invocations --command-id "${{ steps.ssm-command.outputs.command-id }}" --details