name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version/tag to rollback to (e.g., v123 or sha)'
        required: true
        type: string

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_${{ github.event.inputs.environment }} }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rollback backend
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID_${{ github.event.inputs.environment }} }}"
          VERSION="${{ github.event.inputs.version }}"
          
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Rollback QuidPath Backend to $VERSION" \
            --parameters "commands=[
              'cd /opt/quidpath-backend',
              'git checkout $VERSION',
              'docker-compose pull',
              'docker-compose up -d --build --no-deps backend',
              'sleep 30',
              'curl -f http://localhost:8000/api/auth/health/ || exit 1'
            ]" \
            --region ${{ secrets.AWS_REGION }}

      - name: Rollback frontend
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID_${{ github.event.inputs.environment }} }}"
          VERSION="${{ github.event.inputs.version }}"
          
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Rollback QuidPath Frontend to $VERSION" \
            --parameters "commands=[
              'cd /opt/quidpath-frontend',
              'git checkout $VERSION',
              'docker-compose pull',
              'docker-compose up -d --build --no-deps frontend',
              'sleep 30',
              'curl -f http://localhost:3000/ || exit 1'
            ]" \
            --region ${{ secrets.AWS_REGION }}

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Rollback to ${{ github.event.inputs.version }} in ${{ github.event.inputs.environment }} - ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
