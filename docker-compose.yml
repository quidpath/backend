services:
  backend:
    container_name: django-backend
    image: bethwelkimutai/quidpath-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: quidpath_backend.settings.prod
    command: >
      sh -c "
        echo 'Waiting 10 seconds for Postgres to start...';
        sleep 10;
        python manage.py makemigrations &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn quidpath_backend.wsgi:application --bind 0.0.0.0:8000
      "
    depends_on:
      - db
    networks:
      - backend_net

  db:
    image: postgres:15
    container_name: postgres_prod
    restart: always
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net

volumes:
  postgres_data:

networks:
  backend_net:
    driver: bridge