services:
  backend:
    container_name: django-backend
    image: bethwelkimutai/quidpath-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: quidpath_backend.settings.prod
    command: >
      sh -c "
        until pg_isready -h db -U devuser; do
          echo 'Waiting for Postgres to be ready...';
          sleep 2;
        done;
        python manage.py makemigrations &&
        python manage.py migrate &&
        gunicorn quidpath_backend.wsgi:application --bind 0.0.0.0:8000
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net

  db:
    image: postgres:15
    container_name: postgres_prod
    restart: always
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  backend_net:
    driver: bridge
