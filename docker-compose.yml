services:
  db:
    image: postgres:15
    container_name: postgres_prod
    restart: unless-stopped
    volumes:
      - /mnt/quidpath-data-prod/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quidpath_network

  redis:
    image: redis:alpine
    container_name: redis_prod
    restart: unless-stopped
    volumes:
      - /mnt/quidpath-data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quidpath_network

  backend:
    image: ${IMAGE_TAG}
    container_name: quidpath-backend-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8004:8004"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${DB_NAME:-${POSTGRES_DB}}
      DB_USER: ${DB_USER:-${POSTGRES_USER}}
      DB_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD}}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      USE_MEMORY_CHANNEL_LAYER: ${USE_MEMORY_CHANNEL_LAYER}
      DJANGO_SETTINGS_MODULE: quidpath_backend.settings.prod
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      BILLING_SERVICE_URL: ${BILLING_SERVICE_URL}
      BILLING_SERVICE_SECRET: ${BILLING_SERVICE_SECRET}
      BILLING_WEBHOOK_SECRET: ${BILLING_WEBHOOK_SECRET}
    volumes:
      - /mnt/quidpath-data/media:/app/media
      - /mnt/quidpath-data/staticfiles:/app/staticfiles
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -f http://localhost:8004/api/auth/health/ || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
    networks:
      - quidpath_network

networks:
  quidpath_network:
    name: tmp_quidpath_network
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/quidpath-data/postgres
