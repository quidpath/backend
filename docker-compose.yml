services:
  db:
    image: postgres:15
    container_name: postgres_prod
    restart: unless-stopped
    volumes:
      - /mnt/quidpath-data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      # ✅ CORRECTED: Added the database name flag "-d ${POSTGRES_DB}"
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quidpath_network

  backend:
    build: .
    container_name: django-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      # ✅ CLEANUP: Relying completely on the .env file is cleaner
      - .env
    volumes:
      - /mnt/quidpath-data/media:/app/media
      - /mnt/quidpath-data/staticfiles:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/auth/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - quidpath_network


networks:
  quidpath_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/quidpath-data/postgres