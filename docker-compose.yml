services:
  db:
    image: postgres:15
    container_name: postgres_prod
    restart: unless-stopped
    volumes:
      - /mnt/ebs/postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      # ✅ CORRECTED: Added the database name flag "-d ${POSTGRES_DB}"
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quidpath_network

  backend:
    image: .
    container_name: django-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      # ✅ CLEANUP: Relying completely on the .env file is cleaner
      - .env
    volumes:
      - /mnt/ebs/media:/app/media
      - /mnt/ebs/staticfiles:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/auth/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - quidpath_network

  nginx:
    image: nginx:latest
    container_name: nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /mnt/ebs/certbot/conf:/etc/letsencrypt:ro
      - /mnt/ebs/certbot/www:/var/www/certbot:ro
      - /mnt/ebs/staticfiles:/var/www/static:ro
      - /mnt/ebs/media:/var/www/media:ro
    depends_on:
      - backend
    networks:
      - quidpath_network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /mnt/ebs/certbot/conf:/etc/letsencrypt
      - /mnt/ebs/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - quidpath_network

networks:
  quidpath_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/ebs/postgres_data